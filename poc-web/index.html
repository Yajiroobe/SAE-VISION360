<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Vision360 – POC Webcam</title>
    <style>
      html, body { margin: 0; padding: 0; background: #111; color: #eee; font-family: system-ui, Arial, sans-serif; }
      #toolbar { position: fixed; top: 10px; left: 10px; z-index: 10; display: flex; gap: 8px; align-items: center; }
      .btn { background: #2b2b2b; color: #fff; border: 1px solid #444; padding: 6px 10px; border-radius: 6px; cursor: pointer; }
      .btn[aria-pressed="true"] { background: #2962ff; }
      #stats { margin-left: 10px; color: #ccc; font-size: 14px; }
      #labels { position: fixed; bottom: 10px; left: 10px; color: #ddd; font-size: 14px; max-width: 60vw; }
      #stage { position: fixed; inset: 0; display: grid; place-items: center; }
      canvas { max-width: 100vw; max-height: 100vh; }
      #video { display: none; }
    </style>
    <script>
      async function loadScript(src) {
        return new Promise((resolve, reject) => {
          const s = document.createElement('script');
          s.src = src; s.async = true;
          s.onload = () => resolve();
          s.onerror = () => reject(new Error('Failed ' + src));
          document.head.appendChild(s);
        });
      }
      async function loadVendors() {
        const localTf = 'vendor/tf.min.js';
        const localCoco = 'vendor/coco-ssd.min.js';
        const cdnTf = 'https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@4.12.0/dist/tf.min.js';
        const cdnCoco = 'https://cdn.jsdelivr.net/npm/@tensorflow-models/coco-ssd@2.2.2';
        try { await loadScript(localTf); } catch(_) { await loadScript(cdnTf); }
        try { await loadScript(localCoco); } catch(_) { await loadScript(cdnCoco); }
      }
      window.__vendorsReady = loadVendors();
    </script>
  </head>
  <body>
    <div id="toolbar">
      <button id="startBtn" class="btn">Start</button>
      <button id="ttsBtn" class="btn" aria-pressed="false">TTS</button>
      <button id="boxesBtn" class="btn" aria-pressed="true">Show Boxes</button>
      <span id="stats">Idle</span>
    </div>
    <div id="stage">
      <video id="video" autoplay playsinline></video>
      <canvas id="canvas"></canvas>
    </div>
    <div id="labels"></div>

    <script>
      const video = document.getElementById('video');
      const canvas = document.getElementById('canvas');
      const ctx = canvas.getContext('2d');
      const statsEl = document.getElementById('stats');
      const labelsEl = document.getElementById('labels');
      const startBtn = document.getElementById('startBtn');
      const ttsBtn = document.getElementById('ttsBtn');
      const boxesBtn = document.getElementById('boxesBtn');

      let model = null;
      let running = false;
      let showBoxes = true;
      let ttsEnabled = false;
      let lastSpeak = 0;
      const SPEAK_COOLDOWN_MS = 2000;

      function speak(text) {
        if (!ttsEnabled) return;
        const now = performance.now();
        if (now - lastSpeak < SPEAK_COOLDOWN_MS) return;
        lastSpeak = now;
        const u = new SpeechSynthesisUtterance(text);
        u.lang = 'fr-FR';
        window.speechSynthesis.cancel();
        window.speechSynthesis.speak(u);
      }

      function sideAndZone(bbox, W, H) {
        const [x, y, w, h] = bbox;
        const cx = x + w / 2;
        const area = (w * h) / (W * H);
        const side = cx < W * 0.33 ? 'left' : (cx > W * 0.66 ? 'right' : 'center');
        const zone = area > 0.08 ? 'near' : (area > 0.03 ? 'mid' : 'far');
        return { side, zone };
      }

      async function setupCamera() {
        const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' }, audio: false });
        video.srcObject = stream;
        await new Promise(r => video.onloadedmetadata = r);
        // Reduce input size for latency; canvas will display scaled
        const W = Math.min(640, video.videoWidth || 640);
        const H = Math.round(W * (video.videoHeight || 480) / (video.videoWidth || 640));
        canvas.width = W; canvas.height = H;
      }

      async function loadModel() {
        statsEl.textContent = 'Loading model…';
        model = await cocoSsd.load({ base: 'lite_mobilenet_v2' });
        statsEl.textContent = 'Model loaded';
      }

      async function loop() {
        if (!running) return;
        const t0 = performance.now();
        ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
        const preds = await model.detect(canvas, 20);
        const t1 = performance.now();

        let msgs = [];
        if (showBoxes) {
          for (const p of preds) {
            const [x, y, w, h] = p.bbox;
            const { side, zone } = sideAndZone(p.bbox, canvas.width, canvas.height);
            ctx.strokeStyle = 'rgba(0, 200, 255, 0.9)';
            ctx.lineWidth = 2;
            ctx.strokeRect(x, y, w, h);
            ctx.fillStyle = 'rgba(0,0,0,0.6)';
            ctx.fillRect(x, y - 18, ctx.measureText(p.class).width + 70, 18);
            ctx.fillStyle = '#fff';
            ctx.fillText(`${p.class} ${Math.round(p.score*100)}% ${side}/${zone}`, x + 4, y - 6);
            msgs.push(`${p.class} ${side} ${zone}`);
          }
        }

        const dt = (t1 - t0).toFixed(1);
        const fps = (1000 / (t1 - t0)).toFixed(1);
        statsEl.textContent = `FPS ~${fps} | ${dt} ms | ${preds.length} objs`;
        labelsEl.textContent = msgs.join(' · ');

        // Simple alerting: prioritize nearer objects
        const near = preds
          .map(p => ({ p, ...sideAndZone(p.bbox, canvas.width, canvas.height) }))
          .sort((a, b) => (a.zone === 'near' ? -1 : 1));
        if (near[0]) {
          speak(`Attention ${near[0].p.class} ${near[0].side}`);
        }

        requestAnimationFrame(loop);
      }

      startBtn.addEventListener('click', async () => {
        if (!running) {
          try {
            await window.__vendorsReady; // ensure libs loaded
            await setupCamera();
            if (!model) await loadModel();
            running = true;
            startBtn.textContent = 'Stop';
            requestAnimationFrame(loop);
          } catch (e) {
            console.error(e);
            statsEl.textContent = 'Erreur caméra ou modèle';
          }
        } else {
          running = false;
          startBtn.textContent = 'Start';
          statsEl.textContent = 'Stopped';
          const stream = video.srcObject; if (stream) stream.getTracks().forEach(t => t.stop());
        }
      });

      ttsBtn.addEventListener('click', () => {
        ttsEnabled = !ttsEnabled;
        ttsBtn.setAttribute('aria-pressed', String(ttsEnabled));
      });

      boxesBtn.addEventListener('click', () => {
        showBoxes = !showBoxes;
        boxesBtn.setAttribute('aria-pressed', String(showBoxes));
      });
    </script>
  </body>
  </html>
